<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Flipper</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="queries.css" />
  </head>
  <body class="body">
    <header class="header">
      <p class="main-title">Color Flipper</p>
      <p class="main-title">Simple Hex</p>
    </header>
    <main>

        <div class="color-box">
          <p class="text">
            Background Color : <span class="hex-number">#678c8b</span>

        </div>
        <button class="btn margin-top-md">New color</button>
      </section>
    </main>
  </body>
  <script src="script.js"></script>
